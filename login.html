<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/login.css">
  </head>
  <body>
    <header class="header">
      <div>
        <h1>stock logo</h1>
      </div>
      <div class="menu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </div>
      <div>
        <button>Login</button>
        <button>Sign Up</button>
      </div>
    </header>
    <main>
      <form action="../stock-sim-front/index.html">
        <h2 class="form-title">login</h2>
        <div class="id">
          <label for="ID">ID</label>
          <input type="text" id="ID" name="ID" placeholder="아이디를 입력하세요" autocomplete="off"/>
        </div>
        <div class="password">
          <label for="password">PW</label>
          <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요"  autocomplete="off"/>
        </div>
        <button type="submit", class="submit-btn">Login</button>
      </form>
    </main>
  </body>
  
</html>
